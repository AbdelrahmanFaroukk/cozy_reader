<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf9f4"/>
      <stop offset="100%" stop-color="#efdcce"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b15f00"/>
      <stop offset="100%" stop-color="#8d4b00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(96 96)">
    <!-- Book body -->
    <rect x="0" y="0" width="320" height="320" rx="14" fill="#ffffff" stroke="#dbc2b0" stroke-width="2"/>
    <!-- Spine -->
    <rect x="0" y="0" width="46" height="320" rx="6" fill="url(#spine)"/>
    <!-- Pages lines -->
    <rect x="80" y="70" width="200" height="14" rx="4" fill="#554336"/>
    <rect x="80" y="110" width="160" height="10" rx="4" fill="#887364"/>
    <rect x="80" y="138" width="180" height="10" rx="4" fill="#887364"/>
    <rect x="80" y="166" width="120" height="10" rx="4" fill="#887364"/>
    <!-- Bookmark ribbon -->
    <path d="M230 0 L270 0 L270 90 L250 76 L230 90 Z" fill="#8d4b00"/>
  </g>
</svg>
