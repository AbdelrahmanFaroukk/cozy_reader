<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf9f4" id="themeColorMeta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cozy Reader" />
  <title>Cozy Reader</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "surface": "var(--surface)",
            "surface-variant": "var(--surface-variant)",
            "surface-bright": "var(--surface-bright)",
            "surface-dim": "var(--surface-dim)",
            "surface-container-lowest": "var(--surface-container-lowest)",
            "surface-container-low": "var(--surface-container-low)",
            "surface-container": "var(--surface-container)",
            "surface-container-high": "var(--surface-container-high)",
            "surface-container-highest": "var(--surface-container-highest)",
            "background": "var(--surface)",
            "on-background": "var(--on-surface)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "primary": "var(--primary)",
            "on-primary": "var(--on-primary)",
            "primary-container": "var(--primary-container)",
            "on-primary-container": "var(--on-primary-container)",
            "primary-fixed": "var(--primary-fixed)",
            "primary-fixed-dim": "var(--primary-fixed-dim)",
            "on-primary-fixed": "var(--on-primary-fixed)",
            "on-primary-fixed-variant": "var(--on-primary-fixed-variant)",
            "secondary": "var(--secondary)",
            "on-secondary": "var(--on-secondary)",
            "secondary-container": "var(--secondary-container)",
            "on-secondary-container": "var(--on-secondary-container)",
            "secondary-fixed": "var(--secondary-fixed)",
            "secondary-fixed-dim": "var(--secondary-fixed-dim)",
            "on-secondary-fixed": "var(--on-secondary-fixed)",
            "on-secondary-fixed-variant": "var(--on-secondary-fixed-variant)",
            "tertiary": "var(--tertiary)",
            "on-tertiary": "var(--on-tertiary)",
            "tertiary-container": "var(--tertiary-container)",
            "tertiary-fixed": "var(--tertiary-fixed)",
            "on-tertiary-fixed": "var(--on-tertiary-fixed)",
            "outline": "var(--outline)",
            "outline-variant": "var(--outline-variant)",
            "inverse-surface": "var(--inverse-surface)",
            "inverse-on-surface": "var(--inverse-on-surface)",
            "inverse-primary": "var(--inverse-primary)",
            "surface-tint": "var(--surface-tint)",
            "error": "var(--error)",
            "on-error": "var(--on-error)",
            "error-container": "var(--error-container)",
            "on-error-container": "var(--on-error-container)",
          },
          fontFamily: {
            "serif-display": ["Literata", "serif"],
            "serif-body": ["Literata", "serif"],
            "sans-ui": ["Plus Jakarta Sans", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-background text-on-background min-h-[100dvh] flex flex-col antialiased font-serif-body">

  <!-- Update available banner -->
  <div id="updateBanner" class="hidden fixed top-0 left-0 right-0 z-[60] bg-primary text-on-primary px-4 py-2 text-center text-sm font-sans-ui shadow-lg cursor-pointer">
    <span>Update available — tap to refresh</span>
  </div>

  <!-- Top App Bar -->
  <header id="appHeader" class="sticky top-0 z-40 bg-surface/85 backdrop-blur-md flex items-center justify-between px-5 md:px-16 h-14 max-w-[1120px] mx-auto w-full">
    <button data-route="#/library" class="route-btn font-serif-display text-xl font-bold text-primary tracking-tight">Cozy Reader</button>
    <nav class="hidden md:flex gap-1 items-center text-sm font-sans-ui">
      <button data-route="#/library" class="route-btn px-3 py-2 rounded-lg text-on-surface-variant">Library</button>
      <button data-route="#/progress" class="route-btn px-3 py-2 rounded-lg text-on-surface-variant">Progress</button>
      <button data-route="#/settings" class="route-btn px-3 py-2 rounded-lg text-on-surface-variant">Settings</button>
    </nav>
    <div class="flex items-center gap-1">
      <button id="themeQuickToggle" class="p-2 rounded-full text-on-surface-variant hover:bg-surface-container-low active:scale-95 transition" aria-label="Toggle theme">
        <span class="material-symbols-outlined" id="themeQuickIcon">dark_mode</span>
      </button>
      <button id="topImportBtn" class="p-2 rounded-full text-primary hover:bg-surface-container-low active:scale-95 transition" aria-label="Import a book">
        <span class="material-symbols-outlined">upload_file</span>
      </button>
    </div>
  </header>

  <!-- View Container -->
  <main id="viewRoot" class="flex-grow w-full max-w-[1120px] mx-auto px-5 md:px-16 pt-4 pb-28 md:pb-12"></main>

  <!-- Bottom Nav (mobile) -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full z-40 flex justify-around items-center px-2 py-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] bg-surface/90 backdrop-blur-lg border-t border-surface-variant">
    <button data-route="#/library" class="route-btn nav-bottom flex flex-col items-center justify-center px-4 py-1">
      <span class="material-symbols-outlined">book_2</span>
      <span class="text-[11px] mt-0.5 font-sans-ui">Library</span>
    </button>
    <button data-route="#/progress" class="route-btn nav-bottom flex flex-col items-center justify-center px-4 py-1">
      <span class="material-symbols-outlined">analytics</span>
      <span class="text-[11px] mt-0.5 font-sans-ui">Progress</span>
    </button>
    <button data-route="#/settings" class="route-btn nav-bottom flex flex-col items-center justify-center px-4 py-1">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-[11px] mt-0.5 font-sans-ui">Settings</span>
    </button>
  </nav>

  <!-- Floating Add Button -->
  <button id="fab" aria-label="Import a book"
          class="fixed right-5 bottom-[calc(72px+env(safe-area-inset-bottom))] md:bottom-8 md:right-8 z-40 bg-primary text-on-primary w-14 h-14 rounded-full flex items-center justify-center shadow-[0_8px_24px_rgba(141,75,0,0.35)] active:scale-95 transition">
    <span class="material-symbols-outlined text-3xl">add</span>
  </button>

  <!-- File input (hidden) — PDF + EPUB -->
  <input id="pdfInput" type="file" accept="application/pdf,.pdf,application/epub+zip,.epub" multiple class="hidden" />
  <!-- Hidden file input for backup restore -->
  <input id="restoreInput" type="file" accept=".cozy,.json,application/json" class="hidden" />

  <!-- Toast -->
  <div id="toast" class="fixed bottom-24 md:bottom-8 left-1/2 -translate-x-1/2 z-50 hidden bg-inverse-surface text-inverse-on-surface px-4 py-2 rounded-full text-sm font-sans-ui shadow-lg"></div>

  <!-- Reader Options bottom sheet -->
  <div id="optionsBackdrop" class="hidden fixed inset-0 z-[55] bg-black/40 backdrop-blur-sm"></div>
  <div id="optionsSheet" class="hidden fixed bottom-0 left-0 right-0 z-[56] bg-surface-container-low text-on-surface rounded-t-2xl border-t border-outline-variant shadow-[0_-12px_32px_rgba(0,0,0,0.18)] max-h-[85dvh] overflow-y-auto">
    <div class="sticky top-0 bg-surface-container-low/95 backdrop-blur-md px-5 pt-3 pb-2 flex items-center justify-between">
      <div class="flex-1">
        <div class="w-10 h-1 rounded-full bg-outline-variant mx-auto mb-2"></div>
        <h3 class="font-serif-display text-lg">Reading options</h3>
      </div>
      <button id="optionsClose" class="p-2 rounded-full hover:bg-surface-container-high" aria-label="Close">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="px-5 pb-8 space-y-6">

      <div class="space-y-2">
        <h4 class="text-xs uppercase tracking-widest text-on-surface-variant font-sans-ui">Theme</h4>
        <div class="grid grid-cols-3 gap-2">
          <button data-theme-pick="light" class="theme-pick" data-swatch="light">
            <span class="swatch swatch-light"></span><span>Light</span>
          </button>
          <button data-theme-pick="sepia" class="theme-pick" data-swatch="sepia">
            <span class="swatch swatch-sepia"></span><span>Sepia</span>
          </button>
          <button data-theme-pick="dark" class="theme-pick" data-swatch="dark">
            <span class="swatch swatch-dark"></span><span>Dark</span>
          </button>
        </div>
      </div>

      <div class="setting-row">
        <label class="setting-label">Brightness</label>
        <input id="prefBrightness" type="range" min="40" max="100" step="2" class="slider-scrub w-full" />
        <span data-val="prefBrightness" class="setting-val">100%</span>
      </div>

      <div data-epub-only class="space-y-4">
        <div class="space-y-2">
          <h4 class="text-xs uppercase tracking-widest text-on-surface-variant font-sans-ui">Font</h4>
          <div class="grid grid-cols-2 gap-2" id="fontFamilyGrid">
            <button data-font-pick="Literata" class="font-pick" style="font-family: Literata, serif;">Literata</button>
            <button data-font-pick="Lora" class="font-pick" style="font-family: Lora, serif;">Lora</button>
            <button data-font-pick="Georgia" class="font-pick" style="font-family: Georgia, serif;">Georgia</button>
            <button data-font-pick="-apple-system" class="font-pick" style="font-family: -apple-system, system-ui, sans-serif;">System</button>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label">Font size</label>
          <input id="prefFontSize" type="range" min="14" max="32" step="1" class="slider-scrub w-full" />
          <span data-val="prefFontSize" class="setting-val">18px</span>
        </div>

        <div class="setting-row">
          <label class="setting-label">Line height</label>
          <input id="prefLineHeight" type="range" min="12" max="22" step="1" class="slider-scrub w-full" />
          <span data-val="prefLineHeight" class="setting-val">1.6</span>
        </div>

        <div class="setting-row">
          <label class="setting-label">Margin</label>
          <input id="prefMargin" type="range" min="0" max="64" step="2" class="slider-scrub w-full" />
          <span data-val="prefMargin" class="setting-val">24px</span>
        </div>
      </div>

      <div data-pdf-only class="text-xs text-on-surface-variant px-1">
        Font controls don't apply to PDFs — use the zoom controls in the reader. Long-press text to select/copy with iOS native menu.
      </div>
    </div>
  </div>

  <!-- Templates -->
  <template id="tpl-library">
    <section class="space-y-10">
      <div class="space-y-2 pt-2">
        <h1 class="font-serif-display text-3xl md:text-4xl text-on-surface" data-greet>Welcome back</h1>
        <p class="text-on-surface-variant" data-subgreet>Your library is waiting.</p>
      </div>

      <div data-empty class="hidden border-2 border-dashed border-outline-variant rounded-xl py-14 px-6 text-center bg-surface-container-lowest">
        <div class="w-16 h-16 rounded-full bg-primary-container mx-auto flex items-center justify-center text-on-primary-container mb-4">
          <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">menu_book</span>
        </div>
        <h2 class="font-serif-display text-2xl mb-2">Your shelf is empty</h2>
        <p class="text-on-surface-variant mb-6 max-w-md mx-auto">Import a PDF or EPUB. We'll use the first page (or the book's embedded cover) as the cover automatically.</p>
        <button data-act="empty-import" class="bg-primary text-on-primary px-6 py-3 rounded-full text-sm font-sans-ui font-medium active:scale-95 transition">Import a book</button>
      </div>

      <section data-section="reading-now" class="space-y-4 hidden">
        <div class="flex justify-between items-end border-b border-outline-variant pb-2">
          <h2 class="text-lg font-bold text-on-surface">Reading Now</h2>
          <span class="text-xs text-on-surface-variant font-sans-ui" data-count></span>
        </div>
        <div class="slider-host" data-slider-host>
          <div class="slider-track" data-slider-track></div>
          <div class="slider-controls">
            <button class="slider-arrow" data-dir="-1" aria-label="scroll left"><span class="material-symbols-outlined">chevron_left</span></button>
            <input type="range" class="slider-scrub" min="0" max="100" value="0" aria-label="Scrub through books" />
            <button class="slider-arrow" data-dir="1" aria-label="scroll right"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </section>

      <section data-section="all-books" class="space-y-4 hidden">
        <div class="flex justify-between items-end border-b border-outline-variant pb-2">
          <h2 class="text-lg font-bold text-on-surface">All Books</h2>
          <span class="text-xs text-on-surface-variant font-sans-ui" data-count></span>
        </div>
        <div class="slider-host" data-slider-host>
          <div class="slider-track" data-slider-track></div>
          <div class="slider-controls">
            <button class="slider-arrow" data-dir="-1" aria-label="scroll left"><span class="material-symbols-outlined">chevron_left</span></button>
            <input type="range" class="slider-scrub" min="0" max="100" value="0" aria-label="Scrub through books" />
            <button class="slider-arrow" data-dir="1" aria-label="scroll right"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </section>

      <section data-section="finished" class="space-y-4 hidden">
        <div class="flex justify-between items-end border-b border-outline-variant pb-2">
          <h2 class="text-lg font-bold text-on-surface">Finished</h2>
          <span class="text-xs text-on-surface-variant font-sans-ui" data-count></span>
        </div>
        <div class="slider-host" data-slider-host>
          <div class="slider-track" data-slider-track></div>
          <div class="slider-controls">
            <button class="slider-arrow" data-dir="-1" aria-label="scroll left"><span class="material-symbols-outlined">chevron_left</span></button>
            <input type="range" class="slider-scrub" min="0" max="100" value="0" aria-label="Scrub through books" />
            <button class="slider-arrow" data-dir="1" aria-label="scroll right"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </section>
    </section>
  </template>

  <template id="tpl-progress">
    <section class="space-y-10">
      <div class="space-y-2 pt-2">
        <h1 class="font-serif-display text-3xl md:text-4xl text-on-surface">Your reading</h1>
        <p class="text-on-surface-variant">Every metric here comes from your actual reading sessions.</p>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
        <div class="metric-card"><span class="metric-label">Books</span><span class="metric-value" data-metric="books">0</span><span class="metric-sub" data-metric-sub="books"></span></div>
        <div class="metric-card"><span class="metric-label">In progress</span><span class="metric-value" data-metric="inprogress">0</span><span class="metric-sub" data-metric-sub="inprogress"></span></div>
        <div class="metric-card"><span class="metric-label">Pages today</span><span class="metric-value" data-metric="pagesToday">0</span><span class="metric-sub" data-metric-sub="pagesToday"></span></div>
        <div class="metric-card"><span class="metric-label">Streak</span><span class="metric-value" data-metric="streak">0</span><span class="metric-sub" data-metric-sub="streak">days</span></div>
        <div class="metric-card"><span class="metric-label">Pages this week</span><span class="metric-value" data-metric="pagesWeek">0</span><span class="metric-sub" data-metric-sub="pagesWeek"></span></div>
        <div class="metric-card"><span class="metric-label">Time today</span><span class="metric-value" data-metric="timeToday">0m</span><span class="metric-sub" data-metric-sub="timeToday"></span></div>
        <div class="metric-card"><span class="metric-label">Time this week</span><span class="metric-value" data-metric="timeWeek">0m</span><span class="metric-sub" data-metric-sub="timeWeek"></span></div>
        <div class="metric-card"><span class="metric-label">Pages total</span><span class="metric-value" data-metric="pagesTotal">0</span><span class="metric-sub" data-metric-sub="pagesTotal"></span></div>
      </div>

      <section class="space-y-3">
        <div class="flex justify-between items-end border-b border-outline-variant pb-2">
          <h2 class="text-lg font-bold text-on-surface">Last 7 days</h2>
          <span class="text-xs text-on-surface-variant font-sans-ui" data-week-total></span>
        </div>
        <div id="weekChart" class="flex items-end gap-2 h-40 px-1"></div>
      </section>

      <section class="space-y-3">
        <div class="flex justify-between items-end border-b border-outline-variant pb-2">
          <h2 class="text-lg font-bold text-on-surface">Books in progress</h2>
          <span class="text-xs text-on-surface-variant font-sans-ui" data-progress-count></span>
        </div>
        <div class="slider-host" data-slider-host id="progressSliderHost">
          <div class="slider-track" data-slider-track id="progressSliderTrack"></div>
          <div class="slider-controls">
            <button class="slider-arrow" data-dir="-1" aria-label="scroll left"><span class="material-symbols-outlined">chevron_left</span></button>
            <input type="range" class="slider-scrub" min="0" max="100" value="0" aria-label="Scrub through books" />
            <button class="slider-arrow" data-dir="1" aria-label="scroll right"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>
      </section>
    </section>
  </template>

  <template id="tpl-settings">
    <section class="space-y-10">
      <div class="space-y-2 pt-2">
        <h1 class="font-serif-display text-3xl md:text-4xl text-on-surface">Settings</h1>
        <p class="text-on-surface-variant">Reading preferences live on your device.</p>
      </div>

      <div class="space-y-4">
        <h2 class="text-lg font-bold border-b border-outline-variant pb-2">Theme</h2>
        <div class="grid grid-cols-3 gap-2 max-w-md">
          <button data-theme-pick="light" class="theme-pick" data-swatch="light"><span class="swatch swatch-light"></span><span>Light</span></button>
          <button data-theme-pick="sepia" class="theme-pick" data-swatch="sepia"><span class="swatch swatch-sepia"></span><span>Sepia</span></button>
          <button data-theme-pick="dark" class="theme-pick" data-swatch="dark"><span class="swatch swatch-dark"></span><span>Dark</span></button>
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-lg font-bold border-b border-outline-variant pb-2">Reader</h2>
        <div class="setting-row">
          <label class="setting-label">Page width</label>
          <input id="prefPageWidth" type="range" min="380" max="1100" step="20" class="slider-scrub w-full max-w-xs" />
          <span data-val="prefPageWidth" class="setting-val">720px</span>
        </div>
        <p class="text-xs text-on-surface-variant">Tap the slider icon inside the reader for theme, brightness, and EPUB font controls.</p>
      </div>

      <div class="space-y-4">
        <h2 class="text-lg font-bold border-b border-outline-variant pb-2">Backup &amp; updates</h2>
        <p class="text-on-surface-variant text-sm">Your library lives in this device's IndexedDB. Export to a single file before deleting/re-installing the app on iOS — that's the safest way to keep your books, sessions, and highlights.</p>
        <div class="flex flex-wrap gap-3">
          <button id="exportBtn" class="px-4 py-2 rounded-full bg-primary text-on-primary text-sm font-sans-ui">Export library</button>
          <button id="importBtn" class="px-4 py-2 rounded-full border border-outline-variant text-sm font-sans-ui">Restore from backup</button>
          <button id="checkUpdateBtn" class="px-4 py-2 rounded-full border border-outline-variant text-sm font-sans-ui">Check for updates</button>
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-lg font-bold border-b border-outline-variant pb-2">Install</h2>
        <p class="text-on-surface-variant text-sm">On your iPhone, open this page in Safari, tap the Share button, then "Add to Home Screen" to install Cozy Reader as a full-screen app.</p>
      </div>

      <div class="space-y-4">
        <h2 class="text-lg font-bold border-b border-outline-variant pb-2">Danger zone</h2>
        <div class="flex flex-wrap gap-3">
          <button id="resetSessions" class="px-4 py-2 rounded-full border border-outline-variant text-sm font-sans-ui">Reset reading metrics</button>
          <button id="wipeAll" class="px-4 py-2 rounded-full bg-error text-on-error text-sm font-sans-ui">Delete all books &amp; data</button>
        </div>
        <p class="text-xs text-on-surface-variant" id="storageInfo"></p>
      </div>
    </section>
  </template>

  <template id="tpl-reader">
    <section class="space-y-3" id="readerSection">
      <header data-reader-chrome class="flex items-center justify-between gap-1">
        <button data-route="#/library" class="route-btn p-2 rounded-full hover:bg-surface-container-low" aria-label="Back to library">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="flex-1 min-w-0 text-center px-1">
          <div class="text-xs uppercase tracking-widest text-on-surface-variant font-sans-ui truncate" data-reader-title>—</div>
          <div class="text-[11px] text-on-surface-variant font-sans-ui truncate" data-reader-meta>—</div>
        </div>
        <button data-act="options" class="p-2 rounded-full hover:bg-surface-container-low" aria-label="Reading options">
          <span class="material-symbols-outlined">tune</span>
        </button>
        <button data-act="fullscreen" class="p-2 rounded-full hover:bg-surface-container-low" aria-label="Toggle fullscreen">
          <span class="material-symbols-outlined" data-fs-icon>fullscreen</span>
        </button>
        <button data-act="bookmark" class="p-2 rounded-full hover:bg-surface-container-low" aria-label="Bookmark">
          <span class="material-symbols-outlined" data-bookmark-icon>bookmark_border</span>
        </button>
      </header>

      <div id="readerFrame" class="relative">
        <!-- PDF stage -->
        <div id="pdfStage" class="hidden">
          <div id="pdfPan">
            <canvas id="pdfCanvas"></canvas>
            <div id="pdfTextLayer" class="textLayer"></div>
          </div>
        </div>
        <!-- EPUB stage -->
        <div id="epubStage" class="hidden"></div>

        <button data-act="prev" class="reader-edge left-0" aria-label="Previous page">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button data-act="next" class="reader-edge right-0" aria-label="Next page">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
        <button data-act="exit-fullscreen" id="exitFullscreenBtn" class="hidden absolute top-3 right-3 z-40 bg-inverse-surface/85 text-inverse-on-surface w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md shadow-lg" aria-label="Exit fullscreen">
          <span class="material-symbols-outlined">fullscreen_exit</span>
        </button>

        <!-- Floating selection action (shown when user selects EPUB text) -->
        <div id="selectionAction" class="hidden absolute z-50 bg-inverse-surface text-inverse-on-surface rounded-full shadow-lg px-1 py-1 flex items-center gap-1">
          <button data-act="highlight" class="px-3 py-1.5 text-xs font-sans-ui rounded-full hover:bg-white/10">Highlight</button>
          <button data-act="unhighlight" class="px-3 py-1.5 text-xs font-sans-ui rounded-full hover:bg-white/10">Remove</button>
          <button data-act="cancel-sel" class="px-2 py-1.5 hover:bg-white/10 rounded-full" aria-label="Cancel">
            <span class="material-symbols-outlined text-base">close</span>
          </button>
        </div>
      </div>

      <div id="readerControls" class="sticky bottom-2 z-30 mx-auto max-w-[720px] w-full px-2 space-y-2">
        <!-- PDF-only zoom pill -->
        <div data-pdf-only class="flex items-center gap-1 bg-surface-container-high/95 backdrop-blur-md border border-surface-variant rounded-full px-2 py-1.5 shadow-[0_8px_24px_rgba(105,92,81,0.12)]">
          <button data-act="zoom-out" class="zoom-btn" aria-label="Zoom out"><span class="material-symbols-outlined">remove</span></button>
          <button data-act="zoom-reset" class="text-xs font-sans-ui min-w-[3.5rem] text-center px-2 py-1 rounded-full hover:bg-surface-container-highest" data-zoom-label>100%</button>
          <button data-act="zoom-in" class="zoom-btn" aria-label="Zoom in"><span class="material-symbols-outlined">add</span></button>
          <span class="w-px h-5 bg-outline-variant/60 mx-1"></span>
          <button data-act="fit-width" class="text-[11px] font-sans-ui px-2 py-1 rounded-full hover:bg-surface-container-highest" aria-label="Fit to width">Fit</button>
          <span class="flex-1"></span>
          <span class="text-[11px] font-sans-ui text-on-surface-variant px-2">Pinch · swipe · drag</span>
        </div>
        <!-- Page slider (works for both formats) -->
        <div class="flex items-center gap-3 bg-surface-container-high/95 backdrop-blur-md border border-surface-variant rounded-full px-3 py-2 shadow-[0_8px_24px_rgba(105,92,81,0.12)]">
          <span class="text-xs font-sans-ui text-on-surface-variant min-w-[3rem] text-center" data-page-cur>1</span>
          <input id="pageSlider" type="range" min="1" max="1" value="1" class="slider-scrub flex-1" aria-label="Jump to page" />
          <span class="text-xs font-sans-ui text-on-surface-variant min-w-[3rem] text-center" data-page-tot>1</span>
        </div>
      </div>
    </section>
  </template>

  <!-- PDF.js (ESM module) -->
  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.5.136/build/pdf.worker.min.mjs";
    window.pdfjsLib = pdfjsLib;
    window.dispatchEvent(new Event("pdfjs-ready"));
  </script>
  <!-- epub.js (UMD, depends on JSZip) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

  <script src="./app.js" defer></script>
  <script>
    // SW registration with update detection
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((reg) => {
          if (reg.waiting) showUpdateBanner(reg);
          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) showUpdateBanner(reg);
            });
          });
        }).catch(() => {});
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (window.__cozyReloading) return;
          window.__cozyReloading = true;
          window.location.reload();
        });
      });
      function showUpdateBanner(reg) {
        const b = document.getElementById("updateBanner");
        if (!b) return;
        b.classList.remove("hidden");
        b.onclick = () => {
          if (reg.waiting) reg.waiting.postMessage("skipWaiting");
          else window.location.reload();
        };
      }
      window.__cozyCheckUpdate = async () => {
        const reg = await navigator.serviceWorker.getRegistration();
        if (!reg) { window.location.reload(); return; }
        await reg.update();
        if (reg.waiting) reg.waiting.postMessage("skipWaiting");
        else { window.__cozyReloading = true; window.location.reload(); }
      };
    }
  </script>
</body>
</html>
